<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You 💌</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ffe4ec, #ffd6f6, #ffeebf);
      overflow: hidden;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -20px;
      font-size: 20px;
      animation: floatUp linear infinite;
      opacity: 0.7;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      20% { opacity: 0.8; }
      to {
        transform: translateY(-120vh) scale(1.4);
        opacity: 0;
      }
    }

    .card {
      width: min(92vw, 520px);
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 30px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .badge {
      display: inline-block;
      background: #fff;
      color: #ff4f8b;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      box-shadow: 0 6px 18px rgba(255,79,139,0.15);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      color: #ff4f8b;
    }

    p {
      color: #5f4b5a;
      font-size: 1.05rem;
      line-height: 1.6;
      margin: 10px 0;
    }

    .buttons {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.1);
    }

    .yes {
      background: #ff4f8b;
      color: white;
    }

    .secret {
      background: white;
      color: #7a5cff;
    }

    .message {
      margin-top: 20px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      color: #5b4863;
      display: none;
    }

    .footer {
      margin-top: 18px;
      font-size: 0.9rem;
      color: #8b7483;
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <div class="card">
    <div class="badge">made with too much affection ✨</div>
    <h1>hi handsome</h1>
    <p>
      this is your official reminder that you are my favorite person,
      my safest place, and are objectively very cute.
    </p>
    <p>
      i could have sent a normal message... but making you a tiny website
      felt more dramatic.
    </p>

    <div class="buttons">
      <button class="yes" onclick="showLove()">press for a surprise</button>
      <button class="secret" onclick="showSecret()">open secret message</button>
    </div>

    <div class="message" id="messageBox"></div>
    <div class="footer">from your favorite girl 💗</div>
  </div>

  <script>
    const messageBox = document.getElementById('messageBox');

    function showLove() {
      messageBox.style.display = 'block';
      messageBox.innerHTML = 'unlimited kisses 💌';
    }

    function showSecret() {
      messageBox.style.display = 'block';
      messageBox.innerHTML = 'secret message: i like you more than i can express, more than logic, and possibly more than coffee, that is serious.';
    }

    const hearts = document.getElementById('hearts');
    const symbols = ['💗','💖','💕','💘','✨'];

    for (let i = 0; i < 24; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (6 + Math.random() * 8) + 's';
      heart.style.animationDelay = (Math.random() * 8) + 's';
      heart.style.fontSize = (16 + Math.random() * 18) + 'px';
      hearts.appendChild(heart);
    }
  </script>
</body>
</html>
